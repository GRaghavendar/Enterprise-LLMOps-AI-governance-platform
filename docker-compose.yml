services:
  api:
    build: .
    command: python -m uvicorn llmops_governance.api.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    volumes:
      - ./reports:/app/reports

  dashboard:
    build: .
    command: python -m streamlit run app/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    env_file:
      - .env.example
    ports:
      - "8501:8501"
    volumes:
      - ./reports:/app/reports
    depends_on:
      - api

